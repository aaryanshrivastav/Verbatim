# Prometheus Configuration - Component 1 Metrics Pipeline
#
# CORRECT FLOW: Services → OTLP → OTel Collector → Prometheus scraper → Prometheus storage
#
# This configures Prometheus to SCRAPE metrics FROM the OTel Collector.
# The OTel Collector aggregates metrics from all microservices via OTLP.
#
# METRICS FLOW:
# 1. Services emit metrics via OpenTelemetry SDK
# 2. Metrics sent via OTLP to OTel Collector (port 4317)
# 3. OTel Collector processes and exposes at http://otel-collector:8889/metrics
# 4. Prometheus scrapes every 2s from OTel Collector (this config)
# 5. Prometheus stores and makes metrics queryable via PromQL
#
# Metrics collected:
#  • http_request_total (counter): requests per service/endpoint/status
#  • http_request_duration_seconds (histogram): latency percentiles
#  • http_error_total (counter): failures per service/endpoint
#  • external_call_duration_seconds (histogram): dependency call latency
#  • external_call_errors_total (counter): dependency failures
#  • db_query_duration_seconds (histogram): database query duration
#  • cache_hits_total / cache_misses_total (counters): cache efficiency
#  • retry_counter_total (counter): retry attempts
#
# See: observability/OTEL_PIPELINE_GUIDE.md (Part 2) for metric flow details

global:
  scrape_interval: 2s

scrape_configs:
  # Scrape OTel Collector metrics (from microservices via OTLP)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: "/metrics"
